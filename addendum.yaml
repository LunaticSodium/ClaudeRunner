# claude-runner ADDENDUM implementation
#
# Implements A4 → A1 → A2 from ADDENDUM.md in priority order.
# Works in a fresh clone at C:/Temp/cr-addendum/ — never touches the live source.
#
# Usage:
#   claude-runner run projects/addendum.yaml

name: addendum
description: >
  Implement ADDENDUM features A4 (ntfy output passthrough), A1 (buffer-mediated
  message injection), and A2 (git repository as file transfer channel) on the
  marathon branch of ClaudeRunner, then push and open a PR.

prompt: |
  You are implementing three features from ADDENDUM.md for the claude-runner
  project. You are working in a fresh clone of the repository.

  ═══════════════════════════════════════════════════════════════
  STEP 0 — ORIENTATION (do this first, no code yet)
  ═══════════════════════════════════════════════════════════════

  1. Clone the repo and set up your working branch:

       git clone https://github.com/LunaticSodium/ClaudeRunner.git .
       git checkout marathon
       git checkout -b addendum

  2. Read ADDENDUM.md in full to understand the three features.

  3. Read these files to understand the existing codebase:
       claude_runner/ntfy_client.py
       claude_runner/daemon.py
       claude_runner/pipeline.py
       claude_runner/notify.py
       claude_runner/runner.py   (search for ##RUNNER:COMPLETE## handling)

  4. Run the existing tests to establish a baseline:
       pip install -e ".[dev]" -q
       pytest tests/ -q --ignore=tests/test_rate_limit.py 2>&1 | tail -5

  5. Write to .claude-runner/progress.log:
       [PHASE 0] Orientation complete. Tests: N passing. Branch: addendum.

  ═══════════════════════════════════════════════════════════════
  IMPLEMENTATION ORDER — strict, do not reorder
  ═══════════════════════════════════════════════════════════════

  After each feature:
    a) Run: pytest tests/ -q --ignore=tests/test_rate_limit.py
    b) Fix ALL failures before proceeding
    c) git add -A && git commit -m "feat: <feature name>"
    d) Append to .claude-runner/progress.log

  ───────────────────────────────────────────────────────────────
  FEATURE A4 — Claude Code output passthrough to ntfy
  ───────────────────────────────────────────────────────────────

  Location: claude_runner/notify.py  (extend NotificationManager)
            claude_runner/runner.py  (call it on ##RUNNER:COMPLETE##)

  Spec (from ADDENDUM.md A4):
  - On ##RUNNER:COMPLETE## detection, scan the output buffer backwards
    for the last coherent natural-language block produced by Claude Code
    (heuristic: lines after the last tool invocation line, before the marker).
  - Extract up to 3KB of that text as the "completion summary".
  - When sending the on_complete ntfy notification, use this summary as
    the message body. Prefix with:
      "Task: <task_name> | Duration: <HH:MM:SS> | RL cycles: <N>\n\n"
  - If no natural-language block is found, fall back to the structured
    event data only (current behavior — no regression).
  - Truncate gracefully to 4000 chars with "…[truncated]" if needed.
  - The structured event data (duration, rate_limit_cycles) is retained
    as a secondary line appended after the summary.

  Write tests in tests/test_notify_passthrough.py covering:
  - summary extracted correctly when output buffer has NL block after tool lines
  - falls back gracefully when no NL block found
  - truncates at 4000 chars with the truncation marker
  - structured fields always present in final message

  ───────────────────────────────────────────────────────────────
  FEATURE A1 — Buffer-mediated message injection
  ───────────────────────────────────────────────────────────────

  Location: claude_runner/inbox.py  (new file)
            claude_runner/ntfy_client.py  (trigger function)
            claude_runner/runner.py  (restore function hook)

  Spec (from ADDENDUM.md A1):
  - Buffer file: ~/.claude-runner/inbox/pending.md (append-only during accumulation)
  - bool flag: has_pending_messages (module-level in inbox.py)
  - Trigger function (inbox.append_message(text)):
      Appends text to pending.md with a timestamp header.
      Sets has_pending_messages = True.
      Does NOT interrupt Claude Code.
  - Restore function (inbox.drain(process)):
      Called by the runner at natural pause points (after rate-limit resume,
      after context checkpoint, and on the silence-timeout probe path).
      If has_pending_messages is True:
        Inject prompt: "Please read ~/.claude-runner/inbox/pending.md and
          process its contents, then continue your current task."
        Wait for Claude to acknowledge (detect any output within 60s).
        Truncate pending.md to zero bytes.
        Set has_pending_messages = False.
  - Wire ntfy_client.py: when an inbound cmd-channel message arrives that
      does NOT match any pipeline keyword (not a YAML run command), pass it
      to inbox.append_message() instead of dropping it.
  - Wire runner.py: call inbox.drain(process) at the three natural pause
      points listed above.

  Write tests in tests/test_inbox.py covering:
  - append_message writes to pending.md with timestamp
  - has_pending_messages flag set after append, cleared after drain
  - drain is a no-op when has_pending_messages is False
  - pending.md truncated after drain

  ───────────────────────────────────────────────────────────────
  FEATURE A2 — Git repository as file transfer channel
  ───────────────────────────────────────────────────────────────

  Location: claude_runner/pipeline.py  (extend PARSE stage)
            claude_runner/git_inbox.py  (new file)

  Spec (from ADDENDUM.md A2):
  - New pipeline keyword: "fetch <branch-ref>"
    Pattern: message starts with "fetch " followed by a branch name matching
    the pattern task/<name> or inbox/<iso-timestamp>.
  - git_inbox.py implements fetch_branch(branch_ref):
      Uses stored GitHub credential from Windows Credential Manager
      (keyring service name: "claude-runner-github-token").
      git clone --branch <branch_ref> --depth 1 <repo_url> <temp_dir>
      Scans temp_dir for *.yaml files.
      Validates each with load_project_book().
      Enqueues valid project books by calling daemon.enqueue(book, book_path).
      Logs a warning for any invalid YAML (does not raise).
      Cleans up temp_dir on completion.
  - Wire pipeline.py PARSE stage: add "fetch" to the keyword dispatch table.
  - Authentication: credential from keyring, never hardcoded.
    If no credential found, log an error and skip (do not crash the daemon).

  Write tests in tests/test_git_inbox.py covering:
  - fetch_branch skips gracefully when no github token in keyring
  - fetch_branch enqueues valid project books found in the branch
  - fetch_branch logs warning and continues for invalid YAML files
  - pipeline PARSE dispatches "fetch task/foo" to git_inbox handler

  ═══════════════════════════════════════════════════════════════
  COMPLETION
  ═══════════════════════════════════════════════════════════════

  After all three features and tests pass:

  1. Run the full test suite one final time:
       pytest tests/ -q --ignore=tests/test_rate_limit.py
     All tests must pass.

  2. Write a structured report to .claude-runner/addendum-report.md:
       # ADDENDUM Implementation Report
       Date: <ISO timestamp>
       Branch: addendum
       Features: A4, A1, A2
       Tests: N passing / N total
       ## A4 summary
       ## A1 summary
       ## A2 summary
       ## Overall status: PASS or FAIL

  3. Push the branch:
       git push origin addendum

  4. Output ##RUNNER:COMPLETE##

context_anchors: |
  You are implementing features for the claude-runner project.
  Working directory is a fresh clone — not the live runner source.
  Always commit after each feature before proceeding to the next.
  Always run tests and fix failures before moving on.
  Use keyring for all credentials — never hardcode tokens or URLs.
  The ntfy outbound channel is claude-runner-honacoo.

sandbox:
  backend: native
  working_dir: C:/Temp/cr-addendum

execution:
  timeout_hours: 12
  max_rate_limit_waits: 30
  resume_strategy: restate
  skip_permissions: true
  context:
    checkpoint_threshold_tokens: 150000
    reset_on_rate_limit: true
    inject_log_on_resume: true
  milestones:
    - pattern: "PHASE 0"
      message: "Orientation complete — baseline tests established"
    - pattern: "feat: A4"
      message: "A4 committed — ntfy output passthrough done"
    - pattern: "feat: A1"
      message: "A1 committed — buffer message injection done"
    - pattern: "feat: A2"
      message: "A2 committed — git file transfer channel done"
    - pattern: "addendum-report.md"
      message: "Final report written"

output:
  git:
    enabled: false

notify:
  on: [start, rate_limit, resume, complete, error]
  channels:
    - type: webhook
      url: https://ntfy.sh/claude-runner-honacoo

acceptance_criteria:
  checks:
    - type: file_exists
      path: .claude-runner/addendum-report.md

    - type: command
      run: pytest tests/ -q --ignore=tests/test_rate_limit.py
      expect_exit: 0

    - type: file_exists
      path: claude_runner/inbox.py

    - type: file_exists
      path: claude_runner/git_inbox.py

    - type: command
      run: git log --oneline origin/addendum -1
      expect_exit: 0

    - type: llm_judge
      prompt: |
        Read claude_runner/notify.py. Does it extract a natural-language
        summary from Claude's output buffer and include it in the ntfy
        completion notification body? Does it truncate at 4000 chars?
      path: claude_runner/notify.py
      expect: pass

    - type: llm_judge
      prompt: |
        Read claude_runner/inbox.py. Does it implement append_message()
        and drain() with a boolean has_pending_messages flag? Does drain()
        inject a prompt into Claude and truncate pending.md?
      path: claude_runner/inbox.py
      expect: pass

  on_failure: retry
  max_retries: 2
