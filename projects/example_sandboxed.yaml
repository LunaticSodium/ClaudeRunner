# claude-runner example: full-featured sandboxed task
# Demonstrates Docker sandbox, email notifications, webhook, and all execution options.
#
# Usage: claude-runner run projects/example_sandboxed.yaml

name: Refactor authentication module
description: |
  Replace session-based auth with JWT across the backend.
  See docs/auth-migration.md for full requirements.

prompt: |
  You are working in a Python FastAPI project. Your task is to migrate
  the authentication system from session-based to JWT-based.

  Requirements:
    - Replace all session middleware with JWT middleware
    - Update all protected routes to use the new auth dependency
    - Write or update tests for all changed endpoints
    - Do not modify any frontend code
    - Document all changes in CHANGES.md

  Start by reading the existing auth module, then proceed systematically.
  Commit your changes in logical, well-described git commits.

# context_anchors are prepended verbatim to every prompt sent to Claude Code:
# the initial prompt, every resume injection, and every checkpoint prompt.
# Write once here; claude-runner injects silently on every interaction.
# When active, the TUI shows: [context anchors: active]
context_anchors: |
  Before reading any code, identify the relevant interface files first.
  Read only the interfaces and the specific files named in the task.
  Do not read implementation files outside the task scope.
  All configuration values must live in .yaml/.toml files.
  Modules communicate only via plain dicts. Do not change interface contracts.

sandbox:
  working_dir: C:/Projects/myapp
  readonly_mounts:
    - path: C:/Reference/api-specs
      mount_as: /ref/api-specs
  network:
    allow: [api.github.com, pypi.org]
    deny_all_others: true

execution:
  timeout_hours: 12
  max_rate_limit_waits: 10
  resume_strategy: continue   # options: continue | restate | summarize
  skip_permissions: true
  context:
    checkpoint_threshold_tokens: 150000
    reset_on_rate_limit: true
    inject_log_on_resume: true
  milestones:
    - pattern: "All tests passing"
      message: "Tests are green"
    - pattern: "Committed:"
      message: "Claude made a commit"

output:
  git:
    enabled: true
    branch_prefix: claude-task/
    auto_push: false
  log_dir: C:/claude-runner/logs/

notify:
  on: [start, rate_limit, resume, complete, error]
  channels:
    - type: webhook
      url: https://ntfy.sh/YOUR-TOPIC-NAME  # replace with your ntfy.sh topic (run: claude-runner configure)
    - type: desktop
    - type: email                            # optional — remove if not needed
      to: you@example.com
