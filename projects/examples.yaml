# claude-runner example project book — Furina ASCII art
#
# Generates a colored ASCII art portrait of Furina (Focalors) from Genshin Impact
# and packages it as a standalone Windows .exe using PyInstaller.
#
# Usage:
#   claude-runner run examples.yaml
#
# Working directory: ./examples/  (auto-derived from this filename — no need to set it)

name: furina-ascii
description: >
  Generate a Python script that opens a terminal and displays a full-body
  colored ASCII art portrait of Furina (Focalors) from Genshin Impact,
  followed by one of her iconic entrance lines. Package as a standalone
  Windows .exe.

prompt: |
  You are working in an empty Python project directory.

  1. Search the web for Furina (Focalors) from Genshin Impact:
     her appearance (blue and white outfit, top hat, color scheme),
     and one of her most iconic entrance or greeting lines (any language).

  2. Design a full-body colored ASCII art portrait of Furina using ANSI
     escape codes. The portrait must:
     - Be recognizably Furina specifically (top hat, outfit colors, pose)
     - Use her color palette: white, navy blue, gold accents
     - Be at least 40 lines tall and show her full body

  3. Write furina.py that:
     - Clears the terminal on launch
     - Prints the colored ASCII portrait
     - Prints her iconic line below the portrait
     - Waits for a keypress before exiting
     - Handles Windows UTF-8 terminal encoding correctly
     - Works in both cmd.exe and Windows Terminal

  4. Run the script to confirm it works without errors.

  5. Package it with PyInstaller:
       pip install pyinstaller
       pyinstaller --onefile --console furina.py
     Confirm dist/furina.exe exists.

  Deliverable: dist/furina.exe — a standalone Windows executable.

context_anchors: |
  This is a creative coding task. Prioritize visual quality of the ASCII art
  over code elegance. The portrait must be recognizably Furina, not a generic
  anime character.

sandbox:
  backend: native
  # working_dir is intentionally omitted — the runner creates ./examples/
  # automatically (same name as this file). Use 'claude-runner new <name>'
  # to scaffold your own project with its own dedicated folder.

execution:
  timeout_hours: 2
  skip_permissions: true

acceptance_criteria:
  checks:
    - type: file_exists
      path: dist/furina.exe

    - type: command
      run: python -c "import furina; print('ok')"
      expect_exit: 0

    - type: llm_judge
      prompt: |
        Look at furina.py. Does it contain ANSI escape codes for color
        and an ASCII art portrait at least 40 lines tall?
      expect: pass

  on_failure: retry
  max_retries: 2

notify:
  on: [complete, error]
  channels:
    - type: desktop
    - type: webhook
      url: https://ntfy.sh/YOUR-TOPIC-NAME   # replace with your ntfy.sh topic (or remove)
