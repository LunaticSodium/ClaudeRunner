# ── Context anchors ───────────────────────────────────────────────────────────

context_anchors: |
  Repo: BTO_Modulators_Simulator, branch clauded
  New sub-package: bto_runner/ (do NOT touch existing files)
  Python: 3.11+, type annotations required, mypy --strict on bto_runner/
  Key libs: optuna>=3.6, cma>=3.3, numpy, scipy, matplotlib, pydantic>=2.6
  Strategy auto-select: MaterialParam -> TPE | d<15 -> Bayesian | d>=15 -> CMA-ES
  Score: -w1*v_pi - w2*loss + w3*delta_n (surrogate backend)
  Mock sim: deterministic given same seed; PEAKS defined in PHASE-2; default --delay 5.0 s
  ComplexityBudget.total_hours = 10.0 → ~7200 evals at 5 s/eval = 10 h wall-clock
  Real sandwich sweeper eval time: 4–24 h per run — do NOT assume fast evals.
  PID clamp upper = 86400 s (24 h); n_evals uses max(1,...) guard — both mandatory.
  PHASE-8 BLOCKING: run CLI command foreground, wait for exit, do NOT background.
  If Phase 8 run < 6500 evals, escalate: re-run with --delay 10.0 s.
  Commit style: PHASE-N: <short description>
  Do NOT commit with failing tests or ruff/mypy errors.
  SciSim standards: all random ops accept explicit seed, 64-bit floats,
    normalise all output, log run metadata to JSONL.

# ── Protocol ──────────────────────────────────────────────────────────────────

cccs:
  preset: cccs-v1.0
  profile: scisim

marathon_mode: false

# v2.0: Supervisor protocol — enable for adversarial two-tier supervision.
# When enabled, the runner initialises budget system, intake validation,
# thinking manual pre-flight, and auto-forward of LLM responses to ntfy.
supervisor_protocol:
  enabled: false          # Set true for supervised runs
  audit_dir: audit
  confirm_timeout_minutes: 5
  self_check_limit: 3
  supervisor_model: ""    # Empty = use CLI default; e.g. "claude-opus-4-6"
  intervention_limit: 3
  intervention_cooldown_min: 30
  initial_budget_points: 10

# ── Model schedule ────────────────────────────────────────────────────────────

model_schedule:
  poll_interval_seconds: 30
  rules:
    - triggers:
        - phase_gte: 1
          phase_lte: 1
      action:
        model_id: claude-haiku-4-5-20251001
        message: "Haiku for audit — reading only, no generation"

    - triggers:
        - phase_gte: 2
          phase_lte: 3
      action:
        model_id: claude-opus-4-6
        message: "Opus for core architecture (params, budget, executor)"

    - triggers:
        - phase_gte: 4
      action:
        model_id: claude-sonnet-4-6
        message: "Sonnet for strategies, GUI, CLI, tests"

    - triggers:
        - token_pct_gte: 0.80
      action:
        model_id: claude-sonnet-4-6
        message: "Context near limit — maintaining Sonnet"

# ── Sandbox ───────────────────────────────────────────────────────────────────

sandbox:
  backend: native
  working_dir: C:/Local_Projects/BTO_Modulators_Simulatior_runner/workspace

# ── Execution ─────────────────────────────────────────────────────────────────

execution:
  timeout_hours: 96
  max_rate_limit_waits: 50
  skip_permissions: false
  resume_strategy: restate
  silence_timeout_minutes: 2880

  milestones:
    - pattern: "PHASE-1:"
      message: "Phase 1 committed — audit complete"
    - pattern: "PHASE-2:"
      message: "Phase 2 committed — param types, space, mock sim"
    - pattern: "PHASE-3:"
      message: "Phase 3 committed — budget, PID, executor, logger"
    - pattern: "PHASE-4:"
      message: "Phase 4 committed — strategies, scheduler"
    - pattern: "PHASE-5:"
      message: "Phase 5 committed — inverse solver, geometry"
    - pattern: "PHASE-6:"
      message: "Phase 6 committed — GUI"
    - pattern: "PHASE-7:"
      message: "Phase 7 committed — CLI, V&V gates passing"
    - pattern: "PHASE-8:"
      message: "Phase 8 committed — 10-hour simulation run complete"
    - pattern: "PHASE-9:"
      message: "Phase 9 committed — scientific characterisation plots complete"

  context:
    checkpoint_threshold_tokens: 80000

# ── Output ────────────────────────────────────────────────────────────────────

output:
  git:
    enabled: true
    auto_push: false
    remote_url: https://github.com/LunaticSodium/BTO_Modulators_Simulator.git
    branch_prefix: bto-run/

# ── Notifications ─────────────────────────────────────────────────────────────

notify:
  on: [start, complete, error, rate_limit, model_switch]
  channels:
    - type: desktop

# ── Acceptance criteria ───────────────────────────────────────────────────────

acceptance_criteria:
  on_failure: retry
  max_retries: 3
  checks:
    - type: command
      run: pytest tests/ -q
      expect_exit: 0
    - type: command
      run: ruff check bto_runner/
      expect_exit: 0
    - type: command
      run: mypy bto_runner/ --strict
      expect_exit: 0
    - type: command
      run: python -m bto_runner.cli validate --space tests/fixtures/space_continuous.yaml
      expect_exit: 0
    - type: command
      run: python -m bto_runner.cli validate --space tests/fixtures/space_mixed.yaml
      expect_exit: 0
    - type: file_exists
      path: output/phase8_run.jsonl
    - type: command
      run: "python -c \"import json,sys; n=sum(1 for l in open('output/phase8_run.jsonl') if l.strip()); print(f'Evals: {n}'); sys.exit(0 if n>=6500 else 1)\""
      expect_exit: 0
    - type: command
      run: "python -c \"import pathlib,sys; d=pathlib.Path('output/plots'); pngs=list(d.glob('*.png')) if d.exists() else []; n=len(pngs); print('Plots:', n); [print(' ', p.name) for p in sorted(pngs)]; sys.exit(0 if n>=11 else 1)\""
      expect_exit: 0
    - type: file_exists
      path: output/plots/sweetspot_results.json
    - type: file_exists
      path: output/plots/literature_comparison.json
    - type: command
      run: "python -c \"import json,sys; data=json.load(open('output/plots/literature_comparison.json')); mismatches=[r['structure'] for r in data if not r.get('within_order',True)]; print('Lit. comparison mismatches:', mismatches or 'none'); sys.exit(0)\""
      expect_exit: 0
