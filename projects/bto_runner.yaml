name: bto-runner
description: >-
  BTO Simulation Runner — Python optimisation layer that extends the existing
  BTO_Modulators_Simulator with a typed mixed-parameter space, three auto-selected
  search strategies (Hill Climbing / Bayesian-TPE / CMA-ES), budget/PID management,
  an inverse solver, parametric geometry, and a Tkinter GUI. Wraps either the
  existing ML surrogate or a real simulator subprocess as the evaluation back-end.

# ── Prompt ────────────────────────────────────────────────────────────────────

prompt: |
  # BTO Runner — Development Session

  ## Project overview

  You are extending the BTO_Modulators_Simulator repository (branch: clauded)
  with a new Python sub-package `bto_runner/`. The existing code optimises BTO
  electro-optic devices using pre-trained ML surrogate models (LGBM / XGBoost /
  TF) via `Advanced_BTO_Optimizer_ML.py`. Do NOT move or rename any existing file.

  ### Target architecture

  ```
  (existing files — untouched)
  Advanced_BTO_Optimizer_ML.py
  requirements.txt
  ...

  bto_runner/
    __init__.py
    params/
      types.py       # BaseParam, ConstantParam, ScanParam, RangeParam, MaterialParam
      space.py       # ParameterSpace, SpaceType, strategy_for_space()
      material.py    # MaterialLibrary, MaterialEntry, materials.yaml
    budget/
      complexity.py  # ComplexityBudget
      pid.py         # PIDEstimator
    strategies/
      base.py        # AbstractStrategy (ABC)
      hill.py        # HillClimbingStrategy
      bayesian.py    # BayesianStrategy (Optuna TPE)
      cmaes.py       # CMAESStrategy (cma library)
      registry.py    # STRATEGIES dict, auto_select()
    inverse/
      solver.py      # InverseSolver, InverseResult
    geometry/
      shapes.py      # Rectangle
      builder.py     # ParametricGeometry
    runner/
      executor.py    # SimulationExecutor (subprocess | surrogate)
      scheduler.py   # RunScheduler
      logger.py      # RunLogger (JSONL)
    gui/
      app.py         # Tkinter GUI, six panels
    cli.py           # Click CLI entry point
  simulator/
    mock_sim.py      # Deterministic multi-peaked mock, --seed, --delay
  tests/
    test_params.py
    test_budget.py
    test_executor.py
    test_strategies.py
    test_inverse.py
    test_scheduler.py
  ```

  ### Strategy auto-selection rules

  Auto-selection is based on the parameter space composition:

  | Space type                          | Strategy   | Rationale                        |
  |-------------------------------------|------------|----------------------------------|
  | Any MaterialParam present           | TPE        | Native categorical support       |
  | Pure continuous, dims < 15          | Bayesian   | Best eval efficiency             |
  | Pure continuous, dims >= 15         | CMA-ES     | Scales better at high dims       |
  | Any space (fallback / debug)        | Hill       | Always available                 |

  `BayesianStrategy` and `tpe` both map to the same class (Optuna TPE sampler).
  The sampler handles categoricals natively via `suggest_categorical`.

  ### Simulation objectives (from existing code)
  - Minimise switching voltage V_π (V)
  - Minimise propagation loss (dB/cm)
  - Maximise effective refractive index change Δn_eff
  - Scalar score: `score = -w1*v_pi - w2*loss + w3*delta_n`
    (weights configurable, default 1.0 each, normalised to [-1, 1])

  ### Active parameter space (LHS fast solver, for reference)
  | Parameter           | Range        | Type      |
  |---------------------|--------------|-----------|
  | bto_thickness_um    | [0.05, 0.5]  | RangeParam|
  | width_um            | [0.5, 2.0]   | RangeParam|
  | height_um           | [0.05, 0.35] | RangeParam|
  | electrode_gap_um    | [2.5, 7.0]   | RangeParam|
  | electrode_height_um | [0.1, 1.0]   | RangeParam|
  | ridge_angle_deg     | [0.0, 35.0]  | RangeParam|
  | crystal_angle_deg   | [0.0, 90.0]  | RangeParam|
  | wavelength_um       | 1.55         | ConstantParam|

  ## Your task

  Review the full repository and implement bto_runner/ phase by phase.
  Prefix every milestone commit with `PHASE-N:`.

  ### PHASE 1 — Audit
  - `find . -name "*.py" | sort`
  - Read README and Advanced_BTO_Optimizer_ML.py entry point.
  - Identify: parameter definition style, ML model load/call interface,
    existing output format, any material values (n_optical, eps_r, tan_delta).
  - Write AUDIT.md:
      ## What exists
      ## What is missing
      ## Surrogate integration interface (how to call the existing model eval)
      ## Material values found
      ## Risk notes
  - Commit: `PHASE-1: audit complete, AUDIT.md written`

  ### PHASE 2 — Parameter types and space
  Implement `bto_runner/params/` and `simulator/mock_sim.py`.

  `BaseParam` (ABC): name, degrees_of_freedom(), sample(rng)
  `ConstantParam`: value, dof=0, sample always returns value
  `ScanParam`: start/step/stop, grid_values() -> np.arange, treated as discrete
  `RangeParam`: low/high, linspace(n), one continuous dim
  `MaterialParam`: allowed list of str keys, min_count/max_count, sample random

  `ParameterSpace`:
  - continuous_dims(), has_categoricals(), degrees_of_freedom()
  - to_optuna_trial(trial) -> dict
      RangeParam    -> suggest_float
      ScanParam     -> suggest_int mapped to index into grid_values()
      MaterialParam -> suggest_categorical
      ConstantParam -> always returns value, no Optuna call
  - materialise(optuna_params) -> flat JSON-serialisable dict

  `SpaceType` enum + `strategy_for_space(space) -> str` per table above.

  `MaterialLibrary`: loads from materials.yaml; fallback hardcoded defaults.
  Check AUDIT.md "Material values found" first — use existing values for BTO/SiO2/Si.
  Defaults if not found:
    BTO:  n_optical=2.30, eps_r=1000.0, tan_delta=0.02
    SiO2: n_optical=1.44, eps_r=3.9,    tan_delta=0.0001
    Si:   n_optical=3.48, eps_r=11.7,   tan_delta=0.001
    ITO:  n_optical=1.80, eps_r=9.0,    tan_delta=0.05
    Au:   n_optical=0.18, eps_r=-10.0,  tan_delta=2.0
    SiN:  n_optical=2.00, eps_r=7.5,    tan_delta=0.001

  `mock_sim.py`:
  - Reads JSON params from sys.argv[1]
  - Multi-peaked landscape (PEAKS defined below); normalises RangeParam to [0,1]
    PEAKS = [(0.78,0.22,10,0.035),(0.22,0.78,8,0.04),(0.18,0.18,6,0.04),
             (0.72,0.72,5.5,0.04),(0.50,0.30,4,0.05),(0.35,0.62,3.5,0.05)]
    score = sum(h*exp(-((x-cx)**2+(y-cy)**2)/(2*s**2))) + rng.normal(0,0.05)
  - MaterialParam: score *= (1 + 0.1*(n_optical - 2.0))
  - Accepts --seed INT (default 42), --delay FLOAT (default 5.0)
  - Prints {"score": float, "duration_s": float, "seed": int}
  - Same seed + same params MUST produce same score (determinism requirement)

  Also create `tests/fixtures/` with two fixture files used by Phase 7 V&V:
    tests/fixtures/space_continuous.yaml  — pure RangeParam space (7 dims, matches
      the LHS fast solver table above); triggers Bayesian auto-select
    tests/fixtures/space_mixed.yaml       — same dims + one MaterialParam
      (material: [BTO, SiO2, Si]); triggers TPE auto-select

  - Commit: `PHASE-2: param types, space, material library, mock sim`

  ### PHASE 3 — Budget, PID, executor, logger
  `ComplexityBudget`:
  - total_hours=10.0
  - n_evals(sim_time_minutes) = max(1, int((total_hours*60)/sim_time_minutes))
    Note: the max(1,...) guard is mandatory — a single real sandwich sweep can
    take 240–1440 min; without it n_evals returns 0 and the scheduler loop,
    resolution calculation, and any downstream division all break silently
  - range_resolution(n_dims) = max(3, int(n_evals(1.0)**(1/n_dims)))
    Note: when n_evals==1 (budget < 1 eval), resolution falls to the floor of
    3 — this is the correct graceful degradation: run at coarsest resolution
    rather than crashing

  `PIDEstimator`:
  - Kp=0.4, Ki=0.1, Kd=0.05, setpoint=60s, clamp=[5, 86400]
  - update(measured_seconds), reset(), estimated_seconds property
  - Note: clamp upper bound is 86 400 s (24 h) — a single real sandwich sweep
    can legitimately take up to 24 hours; clamping lower would permanently
    corrupt the ETA and budget accounting

  `SimResult` dataclass:
    params, score, raw, duration_s, success, error, seed

  `SimulationExecutor`:
  - Backend "subprocess": serialise params to temp JSON, spawn sim_cmd,
    parse stdout as JSON, no timeout (block until process exits naturally)
  - Backend "surrogate": wrap existing ML model eval from AUDIT.md findings,
    score = -w1*v_pi - w2*loss + w3*delta_n, normalised
  - On non-zero exit or unparseable stdout: SimResult(success=False)
  - If the process is still running when RunScheduler fires stop_event,
    send SIGTERM and wait up to 5 s before SIGKILL (graceful shutdown only)
  - Hard ceiling: if a single eval exceeds 86 400 s (24 h), send SIGTERM/SIGKILL,
    return SimResult(success=False, error="EVAL_EXCEEDED_24H — human review required"),
    print a clearly visible warning to stderr:
      "⚠ EVAL EXCEEDED 24 H — simulation may be diverging or stalled.
         Params logged to output/exceeded_24h.jsonl. Human review required."
    append the params + timestamp to output/exceeded_24h.jsonl,
    then HALT the RunScheduler (do not continue to next eval).
    This is not an automatic retry condition — it requires a human decision.

  `RunLogger`: JSONL, tail(n), best(k), statistics() -> {mean,std,min,max,count}

  Commit: `PHASE-3: budget, PID, executor, logger`

  ### PHASE 4 — Strategies and scheduler
  `HillClimbingStrategy`:
  - n_restarts=3, step_scale=0.12, max_no_improve=6
  - Multi-start; 4 random neighbours per step; shrink step 0.82x on failure
  - Ignores MaterialParam dims (holds at initial sampled value)

  `BayesianStrategy`:
  - optuna.create_study(direction="maximize", sampler=TPESampler())
  - ask(n): study.ask() x n, store trial refs for tell()
  - tell(params, score): study.tell(trial, score)

  `CMAESStrategy`:
  - cma library; normalise dims to [0,1]; initial sigma=0.3
  - ask(n): es.ask() up to n candidates, de-normalise
  - tell(batch, scores): es.tell(candidates, [-s for s in scores])
  - Raises ValueError on mixed space (has MaterialParam)

  `registry.py`:
  - STRATEGIES = {"hill": ..., "bayesian": ..., "tpe": ..., "cmaes": ...}
  - auto_select(space, override=None) -> AbstractStrategy instance

  `RunScheduler`:
  - Loop: ask(1) -> run -> log -> tell -> pid.update -> emit progress to stderr
  - ETA = remaining_budget / pid.estimated_seconds
  - Respects stop_event; finishes current sim before exiting

  Commit: `PHASE-4: all strategies, auto-select, scheduler`

  ### PHASE 5 — Inverse solver and geometry
  `InverseResult`: free_param, target_score, best_value, best_score,
    scan_values, scan_scores, interpolated_crossing

  `InverseSolver`:
  - solve(base_params, target_score, free_param, n_samples=40)
  - solve_all(base_params, target_score) sorted by abs(best_score - target_score)

  `Rectangle`: name, material, width (Range|Constant), height (Range|Constant)
  `ParametricGeometry`:
  - to_space(), validate_material_constraints(), render() -> Figure

  Commit: `PHASE-5: inverse solver, parametric geometry`

  ### PHASE 6 — GUI
  Tkinter + ttk, notebook, six panels, all long ops in daemon threads + queue.Queue.

  Panel 1 — Parameters: per-type widgets, Load/Save YAML,
    "Auto-select strategy" label that updates on param change.
  Panel 2 — Budget: hours spinbox, live PID estimate label, n_evals label,
    strategy combobox [auto/hill/bayesian/tpe/cmaes], backend combobox,
    subprocess cmd entry.
  Panel 3 — Run: [Run]/[Abort], progress bar, scrolling log (30 lines),
    current best score label.
  Panel 4 — Results: Treeview (rank/score/strategy/duration/params),
    [Show inverse] button, [Export CSV].
  Panel 5 — Geometry: shape slots, validate, preview canvas, export to params.
  Panel 6 — Legacy: wrap Advanced_BTO_Optimizer_ML.py with its CLI args,
    stream stdout to Text widget.
  InverseDialog: modal, free param dropdown, compute thread, results treeview,
    embedded score-vs-value plot.

  Commit: `PHASE-6: GUI all panels functional`

  ### PHASE 7 — CLI, pyproject, README, V&V gate
  `bto-runner` Click CLI:
    run     --space YAML --budget HOURS [--strategy NAME] [--sim-cmd CMD]
            [--log FILE] [--seed INT]
            (create parent directories for --log automatically if missing)
    gui     [--space YAML]
    inverse --space YAML --log JSONL --target SCORE [--param NAME]
    validate --space YAML  (prints SpaceType + auto-selected strategy, exits 0/1)
    legacy  [-- ARGS...]

  pyproject.toml (preserve all requirements.txt entries):
    dependencies: numpy>=1.26, scipy>=1.12, optuna>=3.6, cma>=3.3,
                  click>=8.1, pyyaml>=6.0, matplotlib>=3.8, pydantic>=2.6
    dev: pytest>=7.0, pytest-cov, ruff, mypy

  Update README: add "bto_runner extension" section at top, preserve existing.

  V&V gate (all must pass before final commit):
  - pytest tests/ (all green)
  - ruff check bto_runner/
  - mypy bto_runner/ --strict
  - python -m bto_runner.cli validate --space tests/fixtures/space_continuous.yaml
  - python -m bto_runner.cli validate --space tests/fixtures/space_mixed.yaml

  Do NOT print `##RUNNER:COMPLETE##` after Phase 7. Proceed to Phase 8.
  Commit: `PHASE-7: CLI, pyproject, README, all V&V gates passing`

  ### PHASE 8 — Sustained 10-hour simulation run

  CRITICAL BLOCKING REQUIREMENT: You must launch the simulation as a
  foreground blocking process. Do NOT use `&`, `nohup`, `start /B`, or any
  background/detach mechanism. Execute synchronously and wait for the process
  to return before doing anything else. The run will take approximately
  10 hours — this is expected and correct.

  Step 1 — Smoke-test (verify ~36 evals complete cleanly in ~3 min):
    mkdir -p output
    python -m bto_runner.cli run \
      --space tests/fixtures/space_continuous.yaml \
      --budget 0.05 \
      --sim-cmd "python simulator/mock_sim.py --delay 5.0 --seed 42" \
      --log output/phase8_smoke.jsonl --seed 42
  Verify output/phase8_smoke.jsonl has at least 5 lines.
  If this exits non-zero or produces fewer than 5 evals, fix the issue
  before proceeding to Step 2.

  Step 2 — Full 10-hour blocking run:
    Before launching, check if output/phase8_run.jsonl already exists and
    has ≥ 6 500 lines (a prior interrupted run may have completed enough).
    If so, skip directly to Step 4.

    Otherwise record wall-clock time and run (BLOCKING — no &):
      import time; t0 = time.time()   # pseudocode — use shell: SECONDS=$SECONDS
      python -m bto_runner.cli run \
        --space tests/fixtures/space_continuous.yaml \
        --budget 10.0 \
        --sim-cmd "python simulator/mock_sim.py --delay 5.0 --seed 42" \
        --log output/phase8_run.jsonl --seed 42
      elapsed_s = time.time() - t0    # measure after the command returns

  Wait for this command to exit. Do not proceed until it does.
  Expected duration: ~10 hours (budget=10.0 h × 5 s/eval = 7 200 evals).
  The scheduler emits progress to stderr every eval — this is normal.

  Step 3 — Verify and escalate if too fast:
    Read output/phase8_run.jsonl and compute:
      n_evals = number of lines in the JSONL file
      Use the elapsed_s measured around the subprocess call (wall-clock),
      NOT the cumsum of per-entry duration_s (that excludes scheduling overhead).
    If n_evals < 6 500 or elapsed_s < 35 000:
      Resolution escalation: the sim ran faster than expected.
      Re-run with doubled delay (10.0 s/eval) to guarantee ≥10 h:
        python -m bto_runner.cli run \
          --space tests/fixtures/space_continuous.yaml \
          --budget 10.0 \
          --sim-cmd "python simulator/mock_sim.py --delay 10.0 --seed 42" \
          --log output/phase8_run_escalated.jsonl --seed 42
      Wait for this command to exit as well.

  Step 4 — Report:
    Print a summary to stdout:
      - Total evals completed
      - Best score achieved
      - Wall-clock time (seconds)
      - Log file path
    Then print `##RUNNER:COMPLETE##`.

  Commit: `PHASE-8: 10-hour simulation run complete`

  ### PHASE 9 — Scientific EO structure characterisation

  STARTUP: run `git log --oneline` first. If PHASE-1 through PHASE-8 commits
  exist, skip those phases entirely and begin here immediately.

  ENVIRONMENT: the workspace Python is Anaconda (C:/Apps/Anaconda3/python.exe).
  This is correct -- it has all required packages. Run `pip install -e .` once
  if bto_runner is not yet installed (check with `python -c "import bto_runner"`).

  Physics solver import (copy exactly):
    import sys
    sys.path.insert(0, 'bto-sim/py/solvers')
    from BTO_Sandwich_Flat import CombinedBTOFlatThinFilmSolver

  TASK: characterise how EO performance depends on the dielectric stack on top
  of the BTO film (top-core material and spacer layer). The "structures" here
  are different cladding/spacer combinations around the SAME BTO film -- this
  is NOT about replacing BTO with a different EO platform. LNOI and SOH appear
  as dashed analytical reference lines only for context.

  ── Structure configurations (8 BTO structures using the FEM solver) ──────────

  CombinedBTOFlatThinFilmSolver accepts top_core_material in {'sin','sio2','al2o3'}
  and spacer_material in {'air','sio2','al2o3','sin','water'}.

  CRITICAL: set EO coefficients BEFORE calling extract_key_metrics():
    solver.r42 = <r42_SI>   # SI units: m/V  (e.g. 923e-12 for 923 pm/V)
    solver.r51 = solver.r42
    solver.orientation = 'a-axis'
    solver.phi_deg = 0.0    # optimal alignment; varies only in sweep d

  Structure table:
    ID              top_core_material  spacer_material  spacer_thickness_um  r42 pm/V  Reference
    sin_patch       'sin'              'air'            0.0                  923       Eltes APL 2019
    sio2_patch      'sio2'             'air'            0.0                  923
    al2o3_patch     'al2o3'            'air'            0.0                  923
    sin_sio2        'sio2'             'sin'            0.05                 923
    sin_al2o3       'al2o3'            'sin'            0.05                 923
    sio2_al2o3      'al2o3'            'sio2'           0.05                 923
    al2o3_sio2      'sio2'             'al2o3'          0.05                 923
    sin_patch_hq    'sin'              'air'            0.0                  1340      Eltes Nat.Mat. 2020

  Analytical reference lines only (formula, NOT the FEM solver):
    LNOI: r33=27 pm/V, n=2.14, Gamma=0.35  [Wang et al., Nat.Photon. 2018]
    SOH:  r33=150 pm/V, n=1.65, Gamma=0.45 [Lauermann et al., Optica 2016]
    VpiL_Vcm = (100 * 1.55 * g_um) / (n**3 * r33_pm_V * Gamma)
    # units: lambda[um]*g[um] / (n^3 * r33[pm/V] * Gamma) * 100 = V*cm
    # (the 1e-6 from um and 1e-12 from pm/V cancel; *100 converts m->cm)

  ── Step 0: Sweet-spot 2D sweep (find optimal operating point) ───────────────

  For each of the 8 BTO structures, do a coarse 5x5 grid sweep:
    d_BTO : [0.05, 0.15, 0.25, 0.35, 0.50] um   (5 values)
    w_rib : [0.5, 0.75, 1.0, 1.5, 2.0] um        (5 values)
    Fixed : electrode_gap=4.4, voltage=5.0 V, phi_deg=0

  Build a flat param_list of all (structure, d, w) combos and dispatch with
  ProcessPoolExecutor(max_workers=4) per the parallelism standard in CLAUDE.md.
  Preferred VpiL key: 'v_pi_cm_V'. If absent, compute:
    VpiL = (100 * 1.55 * 4.4) / (n_eff**3 * r42_pm_V * 0.35)
  Record vpiL, loss ('loss_base_db_cm'), n_eff ('n_eff_base').

  After the grid: find (d*, w*) = argmin(vpiL) for each structure.
  Save output/plots/sweetspot_results.json:
    {"sin_patch": {"d_opt_um": 0.15, "w_opt_um": 1.0, "vpiL_min_Vcm": 0.23,
                   "loss_dBcm": 0.6, "n_eff": 2.05}, ...}
  Print the sweet-spot table before proceeding.
  Total: 200 solver calls, 4 workers -> ~3 min (vs ~15 min single-threaded).

  ── Step 1: 1D sweeps using sweet-spot as fixed operating point ─────────────

  For each structure, use (d*, w*) from Step 0 as the base operating point.

  a. BTO thickness: linspace(0.05, 0.50, 20) um
     Fixed: w=w*, g=4.4, V=5.0
     Output: vpiL_vs_bto_thickness.png, loss_vs_bto_thickness.png,
             neff_vs_bto_thickness.png

  b. WG width: linspace(0.5, 2.0, 20) um
     Fixed: d=d*, g=4.4, V=5.0
     Output: vpiL_vs_wg_width.png, loss_vs_wg_width.png, neff_vs_wg_width.png

  c. Electrode gap: linspace(2.5, 10.0, 16) um
     Fixed: d=d*, w=w*, V=5.0
     Physics check: VpiL should be approximately linear with g.
     Output: vpiL_vs_electrode_gap.png, loss_vs_electrode_gap.png

  d. Crystal angle: linspace(0, 90, 19) deg
     Set solver.phi_deg = phi each iteration.
     a-axis EO: r42_eff = r42 * cos(phi_rad)**2 (set solver.r42 each iteration)
     Fixed: d=d*, w=w*, g=4.4
     Output: vpiL_vs_crystal_angle.png, loss_vs_crystal_angle.png

  e. Applied voltage: linspace(1, 15, 15) V
     Plot delta_neff only (VpiL is independent of V):
       delta_neff = n_eff**3 * r42_eff * V / (2 * g_um * 1e-6) / 2  (approx)
     Fixed: d=d*, w=w*, g=4.4
     Output: delta_neff_vs_voltage.png

  Plot style: figsize=(10,6), dpi=150, tight_layout(), log-y scale for VpiL.
  Legend: "{structure_id} (r42={r42} pm/V)"; analytical refs as dashed lines.
  Axis labels with units (um, V.cm, dB/cm). Grid on.
  IMPORTANT: write log via open(path,'w',encoding='utf-8') -- do NOT use
  sys.stdout.write for logging (cp1252 crash on Windows with non-ASCII chars).

  Minimum 11 PNG files in output/plots/.

  ── Step 2: Literature comparison ────────────────────────────────────────────

  Extract the sweet-spot VpiL from sweetspot_results.json and compare:
    sin_patch (r42=923):     target 0.05 - 0.50 V.cm  Eltes APL 2019
    sin_patch_hq (r42=1340): target 0.03 - 0.30 V.cm  Eltes Nat.Mat. 2020
    LNOI (analytical):       target 1.0  - 6.0  V.cm  Wang Nat.Photon. 2018
    SOH (analytical):        target 0.10 - 1.5  V.cm  Lauermann Optica 2016

  Write output/plots/literature_comparison.json as a list:
    [{"structure": "sin_patch", "vpiL_Vcm": <val>,
      "target_min": 0.05, "target_max": 0.50,
      "within_order": <bool>,  # true if vpiL in [target_min/10, target_max*10]
      "reference": "Eltes APL 2019"}, ...]

  If any BTO structure has within_order=false, print MISMATCH WARNING and debug:
    1. Was solver.r42 set in SI units (m/V) BEFORE extract_key_metrics()?
       r42=923 pm/V means solver.r42 = 923e-12  (NOT 923)
    2. Is the VpiL key correct? Try both 'v_pi_cm_V' and 'v_pi_V'*g_cm
    3. Is solver.phi_deg=0 (optimal alignment)?
  Fix the issue and re-run the failing structure before committing.

  ── Step 3: Commit ───────────────────────────────────────────────────────────

  git add output/plots/ output/generate_plots.py
  git commit -m "PHASE-9: EO structure characterisation, 8 BTO configs x 5 sweeps + lit. comparison"
  Then print `##RUNNER:COMPLETE##`.

# ── Output mode ───────────────────────────────────────────────────────────────
#
# Separates the "project" (phases 1-8, bto_runner package) from the "target"
# (what scientific analysis phase 9 runs). To run a different analysis, create
# a new YAML file that copies this one and changes only output_mode and the
# phase 9 section of prompt. Phases 1-8 are re-verified but not re-run if
# their commits already exist.

# output_mode: eo-structure-characterization-v2  (commented out — runner schema forbids extra keys)
#   phase: 9
#   structures:
#     - {id: sin_patch,    top_core: sin,   spacer: air,   spacer_thick_um: 0.0,  r42_pm_V: 923}
#     - {id: sio2_patch,   top_core: sio2,  spacer: air,   spacer_thick_um: 0.0,  r42_pm_V: 923}
#     - {id: al2o3_patch,  top_core: al2o3, spacer: air,   spacer_thick_um: 0.0,  r42_pm_V: 923}
