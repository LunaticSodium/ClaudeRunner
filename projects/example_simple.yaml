# claude-runner example: simple task (no Docker, native sandbox)
# Minimal project book — five lines is all you need for basic use.
#
# Usage: claude-runner run projects/example_simple.yaml

name: Example simple task
description: A minimal example showing basic claude-runner usage.

prompt: |
  Please create a simple Python script called hello.py that prints "Hello from claude-runner!"
  Then write a brief README.md explaining what the script does.
  Commit your changes with a descriptive git commit message.

sandbox:
  working_dir: C:/Projects/example  # Change to your project directory

execution:
  timeout_hours: 1
  max_rate_limit_waits: 3
  resume_strategy: continue

notify:
  on: [complete, error]
  channels:
    - type: desktop
    - type: webhook
      url: https://ntfy.sh/YOUR-TOPIC-NAME  # replace with your ntfy.sh topic
