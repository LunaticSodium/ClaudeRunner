# claude-runner v2 — MARATHON MODE implementation
#
# Self-reflective project book: runs v1 claude-runner to implement
# v2 marathon features, then validates with a self-hosted self-test run.
#
# Usage (from ClaudeRunner repo root):
#   claude-runner run projects/marathon.yaml
#
# Prerequisites:
#   - This file lives in the projects/ subdirectory of a ClaudeRunner v1 working dir
#   - The working dir is the runner's own directory (auto-derived — no need to set it)
#   - Git remote 'origin' points to https://github.com/LunaticSodium/ClaudeRunner
#   - ANTHROPIC_API_KEY is available (Credential Manager or env)

name: claude-runner-v2-marathon
description: >
  Implement marathon mode (v2) for claude-runner: persistent daemon,
  Windows autostart via Task Scheduler, ntfy bidirectional command channel,
  inbound message pipeline (RECEIVE→PARSE→CONVERT→LAUNCH→TRASH), trash log,
  and a self-test project book. Implementation is validated by running
  the self-test project book with the runner itself (true self-reflection).

prompt: |
  You are implementing v2 "marathon mode" for claude-runner, a Python-based
  orchestration layer that drives Claude Code autonomously. You are working
  in the runner's working directory, which contains the v1 codebase.
  Your task is to add six features and then validate the result by running
  the self-test project book with the runner itself.

  ═══════════════════════════════════════════════════════════════════
  STEP 0: ORIENTATION (do this first, before writing any code)
  ═══════════════════════════════════════════════════════════════════

  1. Run: git status && git log --oneline -10
  2. Read these files to understand v1 architecture:
       main.py, runner.py, process.py, rate_limit.py, project.py,
       config.py, notify.py, persistence.py, context_manager.py
  3. Run the existing test suite: pytest tests/ -v
     Record which tests pass. Do NOT break any passing tests.
  4. Check that you are on a branch named 'marathon'. If not:
       git checkout -b marathon
  5. Verify ntfy HTTP connectivity: python -c "import requests; r = requests.get('https://ntfy.sh/health'); print(r.status_code)"
  6. Write to .claude-runner/progress.log:
       [PHASE] Orientation complete. v1 tests: X passing. Branch: marathon.

  ═══════════════════════════════════════════════════════════════════
  IMPLEMENTATION ORDER (strict — do not reorder)
  ═══════════════════════════════════════════════════════════════════

  Implement features in this exact order. After each feature:
    a) Run: pytest tests/ -v
    b) Fix ALL failures before proceeding
    c) git add -A && git commit -m "feat: <feature name>"
    d) Write progress to .claude-runner/progress.log

  ─────────────────────────────────────────────────────────────────
  FEATURE 6 — Self-test project book (implement first — used in validation)
  ─────────────────────────────────────────────────────────────────

  Create projects/self-test.yaml with this exact content:

    name: self-test
    description: claude-runner self-diagnostic
    goal: |
      Run the full test suite and diagnose any failures:
      1. Run: pytest tests/ -v --tb=short 2>&1 | tee .claude-runner/pytest-output.txt
      2. If any tests fail, read the relevant source files and fix them.
      3. Run pytest again to confirm all tests pass.
      4. Write a structured report to .claude-runner/self-test-report.md with:
           - Date/time of test run
           - Number of tests: passed / failed / skipped
           - List of any failures and what was fixed
           - Overall status: PASS or FAIL
      5. Output ##RUNNER:COMPLETE##
    sandbox:
      backend: native
      # working_dir intentionally omitted — runner uses its own directory
    execution:
      timeout_hours: 2
      skip_permissions: true
    acceptance_criteria:
      checks:
        - type: file_exists
          path: .claude-runner/self-test-report.md
        - type: command
          run: pytest tests/ -v
          expect_exit: 0
      on_failure: notify
    notify:
      on: [complete, error]
      channels:
        - type: webhook
          url: https://ntfy.sh/claude-runner-honacoo

  Write tests/test_self_test_yaml.py that validates the YAML parses
  and passes pydantic validation.

  ─────────────────────────────────────────────────────────────────
  FEATURE 1 — Windows autostart via Task Scheduler
  ─────────────────────────────────────────────────────────────────

  Create autostart.py:

    TASK_NAME = "claude-runner-marathon"

    def register(exe_path: str) -> None:
      """Register claude-runner as a Windows startup task (current user, limited)."""
      # Use: schtasks /create /tn TASK_NAME /tr exe_path /sc onlogon /rl limited /f
      # Raise RuntimeError on non-zero exit code with schtasks stderr output.
      # Log success to module logger.

    def unregister() -> None:
      """Remove the startup task. Silent if task does not exist."""
      # Use: schtasks /delete /tn TASK_NAME /f
      # Ignore error if task not found (returncode 1 with "not found" in stderr).

    def is_registered() -> bool:
      """Return True if the startup task exists."""
      # Use: schtasks /query /tn TASK_NAME
      # Return False on any error.

  Integrate into config.py / configure wizard:
    - When marathon.enabled is set to True for the first time, call
      autostart.register() with the current exe/script path.
    - `claude-runner stop` calls autostart.unregister() and sets
      marathon.enabled = False.
    - Add "Enable marathon mode?" prompt to the configure wizard
      (after existing prompts, opt-in only).

  Write tests/test_autostart.py:
    - Mock subprocess.run; verify correct schtasks arguments are passed.
    - Test is_registered() returns False when schtasks exits non-zero.
    - Test unregister() does not raise when task not found.

  ─────────────────────────────────────────────────────────────────
  FEATURE 2 — Persistent daemon loop
  ─────────────────────────────────────────────────────────────────

  Create daemon.py:

    class MarathonDaemon:
      """
      Persistent daemon that polls the ntfy cmd channel and dispatches tasks.
      Launched when `claude-runner` is invoked with no arguments in marathon mode,
      or explicitly via `claude-runner marathon`.
      """

      def __init__(self, config: GlobalConfig):
        self.config = config
        self.start_time = datetime.utcnow()
        self.active_task: Optional[RunnerTask] = None
        self._shutdown = threading.Event()

      def run(self) -> None:
        """
        Main loop. Blocks until stop() is called.
        Polls every config.marathon.poll_interval_minutes.
        On each poll: check ntfy cmd channel for new messages.
        """
        self._notify_out("Marathon daemon started.")
        while not self._shutdown.is_set():
          try:
            self._poll_once()
          except Exception as e:
            log.error("Poll error: %s", e)
          self._shutdown.wait(timeout=self.config.marathon.poll_interval_minutes * 60)
        self._notify_out("Marathon daemon stopped.")

      def stop(self) -> None:
        """Signal the daemon to exit after the current poll completes."""
        self._shutdown.set()

      def status(self) -> dict:
        """Return daemon uptime, active task name, and queue state."""
        ...

      def _poll_once(self) -> None:
        """Fetch new messages from cmd channel and dispatch them."""
        ...

      def _notify_out(self, message: str) -> None:
        """Publish a message to the out ntfy channel."""
        ...

  Integrate into main.py:
    - If marathon.enabled and no subcommand given: create and run MarathonDaemon.
    - `claude-runner marathon` explicitly starts daemon mode.
    - `claude-runner stop`: calls daemon.stop() (via pidfile or signal),
      calls autostart.unregister().
    - `claude-runner status`: prints daemon uptime and active task (reads pidfile
      + state file; works even if daemon is a separate process).

  Persist daemon PID to ~/.claude-runner/daemon.pid on start; remove on stop.

  Write tests/test_daemon.py:
    - Test that daemon stops cleanly on stop().
    - Test that _poll_once() is called on schedule.
    - Mock ntfy client; verify no crash on empty poll result.

  ─────────────────────────────────────────────────────────────────
  FEATURE 3 — ntfy inbound command channel
  ─────────────────────────────────────────────────────────────────

  Create ntfy_client.py:

    class NtfyClient:
      """
      Thin wrapper around ntfy.sh HTTP API.
      Both channel names are read from Windows Credential Manager
      (service names: "claude-runner-ntfy-out", "claude-runner-ntfy-cmd").
      Never read from project books or environment variables.
      """

      def publish(self, channel: str, message: str, title: str = "") -> None:
        """POST to https://ntfy.sh/<channel>. Fire-and-forget with 5s timeout."""

      def poll(self, channel: str, since_id: Optional[str]) -> List[NtfyMessage]:
        """
        GET https://ntfy.sh/<channel>/json?since=<since_id or 'all'>&poll=1
        Parse newline-delimited JSON. Return list of NtfyMessage (id, message).
        Update last_message_id in ~/.claude-runner/ntfy_state.json.
        """

    @dataclass
    class NtfyMessage:
      id: str
      message: str
      timestamp: int

  Credential Manager integration:
    - Use keyring library (already used by config.py for ANTHROPIC_API_KEY).
    - Service names: "claude-runner-ntfy-out" and "claude-runner-ntfy-cmd".
    - If not found: log warning, publish disabled for that channel,
      daemon continues operating (graceful degradation).
    - Add ntfy channel setup to configure wizard:
        "ntfy out channel name [claude-runner-honacoo]: "
        "ntfy cmd channel name [claude-runner-honacoo-cmd]: "
      Store via keyring after input. Mask display.

  Write tests/test_ntfy_client.py:
    - Mock requests; verify correct URL construction for publish and poll.
    - Test poll() parses newline-delimited JSON correctly.
    - Test poll() handles empty response (no messages).
    - Test poll() saves last_message_id to ntfy_state.json.

  ─────────────────────────────────────────────────────────────────
  FEATURE 4 — Inbound message pipeline
  ─────────────────────────────────────────────────────────────────

  Create pipeline.py:

    class Pipeline:
      """
      Processes a single inbound ntfy message through five stages.
      RECEIVE → PARSE → CONVERT → LAUNCH → TRASH (on any failure)
      """

      CONTROL_COMMANDS = {"run", "abort", "status", "stop"}  # case-insensitive
      MAX_INLINE_YAML_BYTES = 4096

      def process(self, message: NtfyMessage) -> None:
        """Entry point. Runs all stages; calls _trash() on any unhandled exception."""
        ...

      def _receive(self, message: NtfyMessage) -> None:
        """Publish 'Received command: <first 80 chars>' to out channel."""
        ...

      def _parse(self, message: NtfyMessage) -> PipelineResult:
        """
        Exact keyword match (case-insensitive) against CONTROL_COMMANDS.
        Returns ControlCommand or InlineYaml sentinel.
        run <name>  → find <name>.yaml in projects/ search path
        abort       → abort named running task
        status      → reply with daemon.status() summary
        stop        → call daemon.stop()
        else        → InlineYaml (pass body to CONVERT)
        """
        ...

      def _convert(self, body: str) -> Path:
        """
        yaml.safe_load() the body. On parse failure → _trash().
        Validate against ProjectBook pydantic model. On failure → _trash().
        Enforce MAX_INLINE_YAML_BYTES size limit.
        Write to ~/.claude-runner/inbox/<iso_timestamp>.yaml.
        Return path.
        """
        ...

      def _launch(self, project_path: Path) -> None:
        """
        Start runner on project_path. Publish 'Task started: <name>' to out.
        On failure → _trash().
        """
        ...

      def _trash(self, stage: str, reason: str, original: str) -> None:
        """
        Write to ~/.claude-runner/trash/<iso_timestamp>-<stage>.log.
        Contents: timestamp, stage, reason, original raw message.
        Publish '[TRASH] Failed at <stage>: <reason>' to out channel.
        """
        ...

  Security requirements (enforce strictly):
    - Control command matching is exact keyword match only. No fuzzy matching,
      no substring match. "running" does not match "run". "Stop it" does not match "stop".
    - Inline YAML must pass full pydantic ProjectBook validation before any
      execution — no partial or relaxed validation for remote input.
    - YAML size limit of 4096 bytes enforced before yaml.safe_load().
    - No shell=True anywhere in pipeline execution paths.

  Write tests/test_pipeline.py (comprehensive — this is a security boundary):
    - Test each control command: exact match, case variations, leading/trailing space.
    - Test that "running" does NOT match "run".
    - Test inline YAML happy path: valid YAML → inbox file created → launch called.
    - Test YAML parse failure → trash log written, out notification sent, no crash.
    - Test pydantic validation failure → trash log written.
    - Test size limit enforcement (>4096 bytes → trash).
    - Test _receive() publishes truncated message (≤80 chars).
    - Test _trash() writes correct file to ~/.claude-runner/trash/.

  ─────────────────────────────────────────────────────────────────
  FEATURE 5 — Trash log CLI and view command
  ─────────────────────────────────────────────────────────────────

  Extend existing logs functionality in main.py:
    - `claude-runner logs --trash`: list all files in ~/.claude-runner/trash/,
      sorted newest first. Print filename, stage, first line of reason.
    - `claude-runner logs --trash --last N`: show full content of N most recent
      trash entries (default 1).

  Extend interactive menu (if TUI menu exists) with "View trash log" option.

  Write tests/test_trash_cli.py:
    - Test `logs --trash` with empty trash dir prints "No trash entries."
    - Test `logs --trash` with existing files lists them newest-first.
    - Test `logs --trash --last 2` prints full content of 2 most recent.

  ═══════════════════════════════════════════════════════════════════
  STEP 1: INTEGRATION — wire everything together
  ═══════════════════════════════════════════════════════════════════

  After all six features are implemented and tests pass:

  1. Verify the full import chain works:
       python -c "from daemon import MarathonDaemon; from pipeline import Pipeline; from ntfy_client import NtfyClient; from autostart import register, unregister, is_registered; print('imports OK')"

  2. Verify CLI entry points exist:
       python -m claude_runner --help
       python -m claude_runner marathon --help
       python -m claude_runner stop --help
       python -m claude_runner logs --trash --help

  3. Run the full test suite one final time:
       pytest tests/ -v --tb=short 2>&1 | tee .claude-runner/final-pytest.txt

  Write to .claude-runner/progress.log:
    [PHASE] Integration complete. All tests passing. Starting self-test run.

  ═══════════════════════════════════════════════════════════════════
  STEP 2: SELF-TEST RUN (the real validation)
  ═══════════════════════════════════════════════════════════════════

  Run the self-test project book using the runner itself:

    python -m claude_runner run projects/self-test.yaml

  This is the self-reflective validation: the runner spawns a new Claude Code
  instance that runs pytest, diagnoses failures, and writes a report.

  Wait for it to complete (up to 30 minutes). It will output ##RUNNER:COMPLETE##
  when done and create .claude-runner/self-test-report.md.

  If it fails: read .claude-runner/progress.log and runner logs, fix the issue,
  and re-run. Do not proceed to git push until self-test passes.

  ═══════════════════════════════════════════════════════════════════
  STEP 3: COMMIT AND PUSH
  ═══════════════════════════════════════════════════════════════════

  After self-test produces .claude-runner/self-test-report.md successfully:

  1. git add -A
  2. git commit -m "feat: v2 marathon mode — all features + self-test validated"
  3. git push origin marathon

  If origin/marathon already exists and push is rejected: git push --force-with-lease origin marathon

  Write to .claude-runner/progress.log:
    [DONE] v2 marathon mode complete. Pushed to origin/marathon.

  Then output:
    ##RUNNER:COMPLETE##

context_anchors: |
  EXISTING v1 ARCHITECTURE (do not break):
  - Subprocess launch uses stdin=None + DETACHED_PROCESS (critical — do not change)
  - Task completion detected via ##RUNNER:COMPLETE## in output (not regex on internal strings)
  - progress.log keeps last 50 entries + compressed summary of older entries
  - ANTHROPIC_API_KEY stored in Windows Credential Manager via keyring
  - acceptance_criteria llm_judge uses claude-haiku-4-5-20251001, not Sonnet
  - Rate limit detection uses regex; resume injects "continue" or restatement
  - Self-heal: 5-minute silence → send "continue" probe
  - Rating prompts auto-dismissed by sending "4"

  MARATHON ARCHITECTURE DECISIONS:
  - ntfy channel names: out=claude-runner-honacoo, cmd=claude-runner-honacoo-cmd
  - Both stored in Credential Manager; never in project books or config files on disk
  - Pipeline is a security boundary: strict exact-match for control commands only
  - Inline YAML must pass full pydantic ProjectBook validation before any execution
  - Trash log path: ~/.claude-runner/trash/<iso_timestamp>-<stage>.log
  - Daemon PID file: ~/.claude-runner/daemon.pid
  - ntfy poll state: ~/.claude-runner/ntfy_state.json (persists last_message_id)
  - schtasks task name: "claude-runner-marathon" (constant, do not parameterize)
  - Marathon mode is opt-in: marathon.enabled defaults to False in config schema
  - poll_interval_minutes: 5 (configurable, default 5)

  TESTING PHILOSOPHY:
  - Mock all external calls: subprocess.run (schtasks), requests (ntfy HTTP), keyring
  - Do not make real network calls in tests
  - Pipeline tests are most important — it is a remote code execution boundary
  - Each new module must have a corresponding test file

sandbox:
  backend: native
  working_dir: ../claude-runner

execution:
  timeout_hours: 12
  skip_permissions: true
  context:
    checkpoint_threshold_tokens: 150000
    reset_on_rate_limit: true
    inject_log_on_resume: true

acceptance_criteria:
  # The real proof is that the self-test project book ran end-to-end.
  # We do NOT check individual .py files or run pytest directly here —
  # those are Claude Code's internal concerns. The acceptance gate is:
  #   (1) self-test.yaml exists and is valid (the YAML was designed)
  #   (2) self-test-report.md exists (the YAML was run successfully)
  #   (3) origin/marathon has the commit (push succeeded)
  #   (4) llm_judge confirms the two security-critical modules are correct
  checks:
    - type: file_exists
      path: projects/self-test.yaml

    - type: file_exists
      path: .claude-runner/self-test-report.md

    - type: command
      run: git log --oneline origin/marathon -1
      expect_exit: 0

    - type: llm_judge
      prompt: |
        Read pipeline.py. Does it implement all five pipeline stages:
        RECEIVE, PARSE, CONVERT, LAUNCH, and TRASH? Does PARSE use exact
        keyword matching (not fuzzy or substring matching) for control commands?
        Does CONVERT enforce a byte size limit before yaml.safe_load()?
      path: pipeline.py
      expect: pass

    - type: llm_judge
      prompt: |
        Read projects/self-test.yaml. Is it a valid claude-runner project book
        (has name, description or goal, sandbox with backend, execution with
        timeout_hours, and acceptance_criteria with at least one check)?
        Does it omit working_dir (relying on the runner's own directory)?
      path: projects/self-test.yaml
      expect: pass

  on_failure: retry
  max_retries: 2

notify:
  on: [start, rate_limit, resume, complete, error]
  channels:
    - type: desktop
    - type: webhook
      url: https://ntfy.sh/claude-runner-honacoo
