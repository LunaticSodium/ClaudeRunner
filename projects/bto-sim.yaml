name: bto-sim
description: >-
  BTO Modulator Simulator — WPF/.NET 8.0 front-end that configures and launches
  BTO electro-optic device solvers (LHS dataset generation and sandwich geometry
  sweep) via Python back-end scripts.

# ── Prompt ────────────────────────────────────────────────────────────────────

prompt: |
  # BTO Modulator Simulator — Development Session

  ## Project overview

  `bto-sim` is a WPF (.NET 8.0) application that acts as a configuration
  front-end for BTO (Barium Titanate) electro-optic device physics solvers.
  The solution file is `bto-sim.sln` in the working directory root.

  ### Architecture

  - **UI layer** (`bto-sim/MainWindow.xaml` + `.cs`): WPF form that exposes
    per-solver parameter fields, reads/writes config JSON, and launches the
    selected Python solver as a child process.
  - **Domain layer** (`bto-sim/cs/Config.cs`): JSON-serialisable config model
    covering two solver families — LHS-fast dataset generation and sandwich
    geometry sweep.  Schema version: `0.1.0`.
  - **Solver catalogue** (`bto-sim/cs/SolverCatalog.cs`): static registry of
    `SolverSpec` entries mapping solver types to script paths and enabled fields.
  - **Python solvers** (`bto-sim/py/solvers/`):
    - `BTO_ML_Dataset_Generator_LHS_Fast.py` — Latin-Hypercube sampled dataset
      generator for flat/ridge BTO devices at λ = 1.55 µm.
    - `Sandwich_Autosweeper.py` — geometry optimiser across 9 sandwich stack
      families (Patch/Sandwich topologies × SiO₂/Al₂O₃/SiN top cores ×
      air/SiO₂/Al₂O₃/water/SiN spacers), with optional `opt_gap` mode.
  - **Configs** (`bto-sim/configs/`): example JSON configs for both solver types.

  ### Simulation objectives (all solvers)
  - Minimise switching voltage V_π (V)
  - Minimise propagation loss (dB/cm)
  - Maximise effective refractive index change Δn_eff

  ### Active parameter space (LHS fast solver)
  | Parameter           | Range            |
  |---------------------|------------------|
  | bto_thickness_um    | [0.05, 0.5]      |
  | width_um            | [0.5, 2.0]       |
  | height_um           | [0.05, 0.35]     |
  | electrode_gap_um    | [2.5, 7.0]       |
  | electrode_height_um | [0.1, 1.0]       |
  | ridge_angle_deg     | [0.0, 35.0]      |
  | crystal_angle_deg   | [0.0, 90.0]      |
  | wavelength_um       | 1.55 (fixed)     |
  | voltages_V          | low=0.1, high=5.0|

  ### Sandwich sweep geometry defaults
  | Parameter             | Default  |
  |-----------------------|----------|
  | al2o3_thickness_um    | 0.026    |
  | bto_thickness_um      | 0.150    |
  | spacer_thickness_um   | 0.050    |
  | top_width_um          | 1.000    |
  | top_height_um         | 0.150    |
  | electrode_gap_um      | 4.400    |

  ## Your task

  Review the full solution and extend it to CCCS `scisim` standards.
  Proceed phase by phase; prefix every milestone commit with `PHASE-N:`.

  ### PHASE 1 — Audit & baseline
  - Run `dotnet build bto-sim.sln --configuration Release
    /p:TreatWarningsAsErrors=true` and confirm exit 0.
  - List any existing tests; note gaps.
  - Confirm `Nullable enable` and no suppressions in new code.

  ### PHASE 2 — Test suite
  - Add an xUnit test project `bto-sim.Tests` to the solution.
  - Cover: `Config` round-trip JSON serialisation, `SolverCatalog`
    field-set correctness for all three solver specs, and `ConfigIO`
    load/save with temp files.
  - `dotnet test` must pass; line coverage on the `bto_sim` namespace ≥ 80 %.

  ### PHASE 3 — Solver integration hardening
  - Ensure Python subprocess exit code and stderr are surfaced to the UI
    status bar (not silently swallowed).
  - Add an output directory picker that defaults to
    `output/<solver-type>/<yyyyMMdd-HHmmss>`.
  - Validate that the output dir exists before launching the solver.

  ### PHASE 4 — V&V gate
  - `dotnet build` passes (warnings as errors, Release config).
  - `dotnet test` passes.
  - Commit structured output with solver type and seed logged to
    `output/<solver-type>/<run>/metadata.json`.
  - Print `##RUNNER:COMPLETE##` when all gates pass.

# ── Context anchors (injected on resume/restate) ──────────────────────────────

context_anchors: |
  Solution root: bto-sim.sln (.NET 8.0 WPF)
  Project flags: <Nullable>enable</Nullable>, <UseWPF>true</UseWPF>
  Active solver types: bto_ml_dataset_lhs_fast | bto_sandwich_sweep
  Python env: numpy, scipy, matplotlib, pandas, scipy.stats.qmc (+ optional cupy/CUDA)
  Commit style: PHASE-N: <short description>
  Do NOT commit with failing tests.

# ── Protocol & runway ─────────────────────────────────────────────────────────

cccs:
  preset: cccs-v1.0
  profile: scisim

marathon_mode: false

# ── Phase-aware model schedule ────────────────────────────────────────────────

model_schedule:
  poll_interval_seconds: 20
  rules:
    - triggers:
        - phase_gte: 1
          phase_lte: 1
      action:
        model_id: claude-haiku-4-5-20251001
        message: "Haiku for audit and baseline"

    - triggers:
        - phase_gte: 2
      action:
        model_id: claude-sonnet-4-6
        message: "Sonnet for test authoring and integration hardening"

    - triggers:
        - token_pct_gte: 0.82
      action:
        model_id: claude-sonnet-4-6
        message: "Context near full — maintaining Sonnet"

# ── Sandbox ───────────────────────────────────────────────────────────────────

sandbox:
  backend: native
  working_dir: C:/Local_Projects/BTO_Modulators_Simulatior_runner/workspace

# ── Execution ─────────────────────────────────────────────────────────────────

execution:
  timeout_hours: 6
  max_rate_limit_waits: 20
  skip_permissions: false
  resume_strategy: restate
  silence_timeout_minutes: 12

  milestones:
    - pattern: "PHASE-1:"
      message: "Phase 1 committed — audit complete"
    - pattern: "PHASE-2:"
      message: "Phase 2 committed — test suite in place"
    - pattern: "PHASE-3:"
      message: "Phase 3 committed — solver hardening done"
    - pattern: "PHASE-4:"
      message: "Phase 4 committed — V&V gate passed"

  context:
    checkpoint_threshold_tokens: 80000

# ── Output ────────────────────────────────────────────────────────────────────

output:
  git:
    enabled: true
    auto_push: false
    remote_url: https://github.com/LunaticSodium/BTO_Modulators_Simulator.git
    branch_prefix: clauded-runner/

# ── Notifications ─────────────────────────────────────────────────────────────

notify:
  on: [start, complete, error, rate_limit, model_switch]
  channels:
    - type: desktop

# ── Acceptance criteria ───────────────────────────────────────────────────────

acceptance_criteria:
  on_failure: retry
  max_retries: 2
  checks:
    - type: command
      run: dotnet build bto-sim.sln --configuration Release /p:TreatWarningsAsErrors=true
      expect_exit: 0
    - type: command
      run: dotnet test bto-sim.sln --configuration Release
      expect_exit: 0
