# claude-runner example project books
#
# This file contains three example tasks separated by YAML document markers (---).
# Use any one of them as a starting point:
#
#   claude-runner run projects/examples.yaml          ← runs the first document
#
# To run a specific document, copy it to its own file, or use --doc N (1-indexed):
#
#   See TUTORIAL.md for a full walkthrough.

# ══════════════════════════════════════════════════════════════════════════════
# Example 1 — Hello World (native backend, no Docker required)
# The fastest way to verify your setup.  Takes about 1 minute.
# ══════════════════════════════════════════════════════════════════════════════

name: Hello Claude
description: >
  Minimal hello-world task. Verifies that claude-runner can launch Claude Code,
  have it write and run a script, and commit the result. Takes about 1 minute.

prompt: |
  Please do the following three things in order:

  1. Create a file called hello.py in the current directory with the single
     line:  print("Hello from claude-runner!")

  2. Run it with:  python hello.py
     and confirm the output is correct.

  3. Write a one-line README.md that says:
     "# Hello Claude — generated by claude-runner"

  After completing all three steps, summarise what you did in one sentence.

sandbox:
  backend: native                          # runs Claude Code directly on your machine (no Docker needed)
  working_dir: C:/Projects/hello-claude   # change to any empty git-initialised directory

execution:
  timeout_hours: 1
  max_rate_limit_waits: 3
  resume_strategy: continue
  skip_permissions: true                  # lets Claude run python/write files without prompting you

notify:
  on: [complete, error]
  channels:
    - type: desktop
    - type: webhook
      url: https://ntfy.sh/YOUR-TOPIC-NAME   # replace with your ntfy.sh topic (or remove)

output:
  git:
    enabled: true   # creates a commit in working_dir when the task completes

---
# ══════════════════════════════════════════════════════════════════════════════
# Example 2 — Full-featured sandboxed task (Docker backend)
# Demonstrates Docker sandbox, email notifications, webhook, and all execution options.
# ══════════════════════════════════════════════════════════════════════════════

name: Refactor authentication module
description: |
  Replace session-based auth with JWT across the backend.
  See docs/auth-migration.md for full requirements.

prompt: |
  You are working in a Python FastAPI project. Your task is to migrate
  the authentication system from session-based to JWT-based.

  Requirements:
    - Replace all session middleware with JWT middleware
    - Update all protected routes to use the new auth dependency
    - Write or update tests for all changed endpoints
    - Do not modify any frontend code
    - Document all changes in CHANGES.md

  Start by reading the existing auth module, then proceed systematically.
  Commit your changes in logical, well-described git commits.

# context_anchors are prepended verbatim to every prompt sent to Claude Code:
# the initial prompt, every resume injection, and every checkpoint prompt.
# Write once here; claude-runner injects silently on every interaction.
# When active, the TUI shows: [context anchors: active]
context_anchors: |
  Before reading any code, identify the relevant interface files first.
  Read only the interfaces and the specific files named in the task.
  Do not read implementation files outside the task scope.
  All configuration values must live in .yaml/.toml files.
  Modules communicate only via plain dicts. Do not change interface contracts.

sandbox:
  backend: docker
  working_dir: C:/Projects/myapp
  readonly_mounts:
    - path: C:/Reference/api-specs
      mount_as: /ref/api-specs
  network:
    allow: [api.github.com, pypi.org]
    deny_all_others: true

execution:
  timeout_hours: 12
  max_rate_limit_waits: 10
  resume_strategy: continue   # options: continue | restate | summarize
  skip_permissions: true
  context:
    checkpoint_threshold_tokens: 150000
    reset_on_rate_limit: true
    inject_log_on_resume: true
  milestones:
    - pattern: "All tests passing"
      message: "Tests are green"
    - pattern: "Committed:"
      message: "Claude made a commit"

output:
  git:
    enabled: true
    branch_prefix: claude-task/
    auto_push: false
  log_dir: C:/claude-runner/logs/

notify:
  on: [start, rate_limit, resume, complete, error]
  channels:
    - type: webhook
      url: https://ntfy.sh/YOUR-TOPIC-NAME  # replace with your ntfy.sh topic (run: claude-runner configure)
    - type: desktop
    - type: email                            # optional — remove if not needed
      to: you@example.com

---
# ══════════════════════════════════════════════════════════════════════════════
# Example 3 — Creative coding task (Furina ASCII art + PyInstaller exe)
# Demonstrates web search, ANSI art generation, and packaging with PyInstaller.
# ══════════════════════════════════════════════════════════════════════════════

name: furina-ascii
description: >
  Generate a Python script that opens a terminal and displays a full-body
  colored ASCII art portrait of Furina (Focalors) from Genshin Impact,
  followed by one of her iconic entrance lines. Package as a standalone
  Windows .exe.

prompt: |
  You are working in an empty Python project directory.

  1. Search the web for Furina (Focalors) from Genshin Impact:
     her appearance (blue and white outfit, top hat, color scheme),
     and one of her most iconic entrance or greeting lines (any language).

  2. Design a full-body colored ASCII art portrait of Furina using ANSI
     escape codes. The portrait must:
     - Be recognizably Furina specifically (top hat, outfit colors, pose)
     - Use her color palette: white, navy blue, gold accents
     - Be at least 40 lines tall and show her full body

  3. Write furina.py that:
     - Clears the terminal on launch
     - Prints the colored ASCII portrait
     - Prints her iconic line below the portrait
     - Waits for a keypress before exiting
     - Handles Windows UTF-8 terminal encoding correctly
     - Works in both cmd.exe and Windows Terminal

  4. Run the script to confirm it works without errors.

  5. Package it with PyInstaller:
       pip install pyinstaller
       pyinstaller --onefile --console furina.py
     Confirm dist/furina.exe exists.

  Deliverable: dist/furina.exe — a standalone Windows executable.

context_anchors: |
  This is a creative coding task. Prioritize visual quality of the ASCII art
  over code elegance. The portrait must be recognizably Furina, not a generic
  anime character.

sandbox:
  backend: docker
  working_dir: C:/temp/furina-test

execution:
  timeout_hours: 2
  skip_permissions: true

notify:
  on: [complete, error]
  channels:
    - type: webhook
      url: https://ntfy.sh/YOUR-TOPIC-NAME   # replace with your ntfy.sh topic (or remove)
